<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zyntra AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Zyntra AI</h2>
                <p id="authSubtitle">Welcome back</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Email address</label>
                    <input type="email" id="loginEmail" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-input">
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">Show</button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" checked> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <div id="loginError" class="error-message"></div>
                <button type="submit" class="btn-primary" id="loginBtn">Continue</button>
                <div class="auth-separator"><span>OR</span></div>
                
                <!-- Google Login Button container -->
                <div id="googleButtonContainer" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>

                <p class="auth-switch">Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up</a></p>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email address</label>
                    <input type="email" id="signupEmail" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="password-input">
                        <input type="password" id="signupPassword" required minlength="6" placeholder="At least 6 characters">
                        <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">Show</button>
                    </div>
                </div>
                <div id="signupError" class="error-message"></div>
                <button type="submit" class="btn-primary" id="signupBtn">Create Account</button>
                <p class="auth-switch">Already have an account? <a href="#" onclick="switchTab('login')">Log in</a></p>
            </form>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
